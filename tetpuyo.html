<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TetPuyo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex; flex-direction: column; align-items: center;
    background: #425097; font-family: sans-serif; color: #fff;
    padding: 15px 5px 0; user-select: none;
  }

  /* 上部バー */
  .top-bar {
    display: flex; flex-direction: row; align-items: stretch;
    justify-content: center; gap: 6px;
    width: 100%; height: 46px; flex-shrink: 0;
  }
  canvas#game { display: block; margin: 4px auto 0; }
  .next-box {
    display: flex; align-items: center; justify-content: center;
    background: #1a1a3e; border-radius: 4px; padding: 2px 5px;
  }
  .lbl { font-size: 11px; color: #aaa; margin-bottom: 1px; text-align: center; }
  .stat-box {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: #1a1a3e; border-radius: 4px; padding: 2px 5px; width: auto;
  }
  .stat-box .val { font-size: 14px; font-weight: bold; }
  #chainDisp { font-size: 12px; color: #ffea00; text-align: center; align-self: center; }
  button.restart {
    padding: 4px 10px; font-size: 12px; border: none;
    border-radius: 6px; background: #e94560; color: #fff; cursor: pointer;
    width: auto; align-self: center;
  }
  button.restart:hover { background: #ff6b81; }

  /* ===== MOBILE ===== */
  @media (max-width: 768px) {
    body { min-height: 0; overflow: hidden; }
    #titleScreen {
      background:
        url('background.png') no-repeat center bottom / 50%,
        #071448;
    }
  }

  /* ===== TITLE SCREEN ===== */
  #titleScreen {
    position: fixed; inset: 0;
    background:
      url('background.png') no-repeat center bottom / auto,
      #071448;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding-bottom: calc(clamp(120px, 45vw, 360px) + 120px);
    z-index: 200;
  }
  #titleScreen img#titleLogo {
    width: clamp(180px, 65vw, 500px);
    height: auto;
    display: block;
  }
  #titleBottom {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
  }
  #difficultyBtns {
    display: flex;
    gap: 12px;
  }
  .diffBtn {
    padding: clamp(8px, 2vw, 12px) clamp(18px, 4.5vw, 36px);
    font-size: clamp(15px, 3.5vw, 22px);
    font-weight: bold;
    border: 2px solid rgba(255,255,255,0.35);
    border-radius: 10px;
    background: rgba(7, 20, 72, 0.75);
    color: rgba(255,255,255,0.65);
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .diffBtn.selected {
    border-color: #00e5ff;
    background: rgba(0, 229, 255, 0.15);
    color: #00e5ff;
    box-shadow: 0 0 14px rgba(0, 229, 255, 0.35);
  }
  .diffBtn:hover {
    background: rgba(255,255,255,0.12);
    color: #fff;
  }
  #titleScreen img#titleStartBtn {
    width: clamp(120px, 45vw, 360px);
    height: auto;
    cursor: pointer;
    display: block;
    transition: transform 0.1s, filter 0.1s;
  }
  #titleScreen img#titleStartBtn:hover {
    transform: scale(1.05);
    filter: brightness(1.1);
  }
  #titleScreen img#titleStartBtn:active {
    transform: scale(0.97);
  }
</style>
</head>
<body>
<div id="titleScreen">
  <img id="titleLogo" src="logo.png" alt="TetPuyo">
  <div id="titleBottom">
    <div id="difficultyBtns">
      <button class="diffBtn selected" data-diff="easy">初級</button>
      <button class="diffBtn" data-diff="normal">中級</button>
      <button class="diffBtn" data-diff="hard">上級</button>
    </div>
    <img id="titleStartBtn" src="start-button.png" alt="スタート">
  </div>
</div>
<div class="top-bar">
  <div class="next-box">
    <canvas id="nextCanvas" width="40" height="40"></canvas>
  </div>
  <div class="stat-box"><div class="lbl">スコア</div><div class="val" id="scoreDisp">0</div></div>
  <div class="stat-box"><div class="lbl">Lv</div><div class="val" id="levelDisp">1</div></div>
  <div class="stat-box"><div class="lbl">ライン</div><div class="val" id="linesDisp">0</div></div>
  <div id="chainDisp"></div>
  <button class="restart" id="restartBtn" onclick="startGame()">再スタート</button>
</div>
<canvas id="game"></canvas>
<script>
// === CONSTANTS ===
const COLS = 20;
const ROWS = 40;
const MOBILE_BREAKPOINT = 768;

// Layout variables — computed by computeLayout()
let CELL, BOARD_X, BOARD_Y, CANVAS_W, CANVAS_H;
let isMobileLayout = false;

const COLORS = [
  null,
  '#00e5ff', // 1 cyan  (I)
  '#2962ff', // 2 blue  (J)
  '#ff9100', // 3 orange(L)
  '#ffea00', // 4 yellow(O)
  '#00e676', // 5 green (S)
  '#d500f9', // 6 purple(T)
  '#ff1744', // 7 red   (Z)
  '#78909c', // 8 gray  (pre-existing)
];

// === PIECE DEFINITIONS (SRS) ===
const SHAPES = {
  I: [[[0,0],[0,1],[0,2],[0,3]],[[0,2],[1,2],[2,2],[3,2]],[[2,0],[2,1],[2,2],[2,3]],[[0,1],[1,1],[2,1],[3,1]]],
  J: [[[0,0],[1,0],[1,1],[1,2]],[[0,1],[0,2],[1,1],[2,1]],[[1,0],[1,1],[1,2],[2,2]],[[0,1],[1,1],[2,0],[2,1]]],
  L: [[[0,2],[1,0],[1,1],[1,2]],[[0,1],[1,1],[2,1],[2,2]],[[1,0],[1,1],[1,2],[2,0]],[[0,0],[0,1],[1,1],[2,1]]],
  O: [[[0,1],[0,2],[1,1],[1,2]],[[0,1],[0,2],[1,1],[1,2]],[[0,1],[0,2],[1,1],[1,2]],[[0,1],[0,2],[1,1],[1,2]]],
  S: [[[0,1],[0,2],[1,0],[1,1]],[[0,1],[1,1],[1,2],[2,2]],[[1,1],[1,2],[2,0],[2,1]],[[0,0],[1,0],[1,1],[2,1]]],
  T: [[[0,1],[1,0],[1,1],[1,2]],[[0,1],[1,1],[1,2],[2,1]],[[1,0],[1,1],[1,2],[2,1]],[[0,1],[1,0],[1,1],[2,1]]],
  Z: [[[0,0],[0,1],[1,1],[1,2]],[[0,2],[1,1],[1,2],[2,1]],[[1,0],[1,1],[2,1],[2,2]],[[0,1],[1,0],[1,1],[2,0]]],
};

const PIECE_COLORS = { I:1, J:2, L:3, O:4, S:5, T:6, Z:7 };
const PIECE_TYPES = ['I','J','L','O','S','T','Z'];

// SRS wall kick data
const KICKS_NORMAL = {
  '0>1': [[0,0],[-1,0],[-1,-1],[0,2],[-1,2]],
  '1>0': [[0,0],[1,0],[1,1],[0,-2],[1,-2]],
  '1>2': [[0,0],[1,0],[1,1],[0,-2],[1,-2]],
  '2>1': [[0,0],[-1,0],[-1,-1],[0,2],[-1,2]],
  '2>3': [[0,0],[1,0],[1,-1],[0,2],[1,2]],
  '3>2': [[0,0],[-1,0],[-1,1],[0,-2],[-1,-2]],
  '3>0': [[0,0],[-1,0],[-1,1],[0,-2],[-1,-2]],
  '0>3': [[0,0],[1,0],[1,-1],[0,2],[1,2]],
};
const KICKS_I = {
  '0>1': [[0,0],[-2,0],[1,0],[-2,1],[1,-2]],
  '1>0': [[0,0],[2,0],[-1,0],[2,-1],[-1,2]],
  '1>2': [[0,0],[-1,0],[2,0],[-1,-2],[2,1]],
  '2>1': [[0,0],[1,0],[-2,0],[1,2],[-2,-1]],
  '2>3': [[0,0],[2,0],[-1,0],[2,-1],[-1,2]],
  '3>2': [[0,0],[-2,0],[1,0],[-2,1],[1,-2]],
  '3>0': [[0,0],[1,0],[-2,0],[1,2],[-2,-1]],
  '0>3': [[0,0],[-1,0],[2,0],[-1,-2],[2,1]],
};

// === GAME STATE ===
let board, currentPiece, nextType, bag;
let score, level, totalLines, chainCount;
let gameState;
let dropTimer, dropInterval, lockDelay, lockResets, onGround;
let particles = [];
let fallingRowsAnim = null;
let lastTime;
let difficulty = 'easy';
let riseInterval = null;
let riseGapCol = null;
let riseSegRemain = 0;

// DAS state
let dasKeys = {};
const DAS_DELAY = 170;
const DAS_REPEAT = 50;

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const nextCanvas = document.getElementById('nextCanvas');
const nextCtx = nextCanvas ? nextCanvas.getContext('2d') : null;

// === RESPONSIVE LAYOUT ===
function computeLayout() {
  const screenW = window.innerWidth;
  const screenH = window.innerHeight;
  isMobileLayout = screenW <= MOBILE_BREAKPOINT;

  const TOP_BAR_H = 46;
  const HPAD = 5;
  const VPAD = 15;

  const availW = screenW - HPAD * 2;
  const availH = screenH - TOP_BAR_H - VPAD;

  const cellFromW = Math.floor((availW - 20) / COLS); // 20 = BOARD_X(10) + 右余白(10)
  const cellFromH = Math.floor((availH - 20) / ROWS);
  CELL = Math.max(8, Math.min(20, Math.min(cellFromW, cellFromH)));

  BOARD_X = 10;
  BOARD_Y = 10;
  CANVAS_W = BOARD_X + COLS * CELL + 10;
  CANVAS_H = BOARD_Y + ROWS * CELL + 10;

  canvas.width = CANVAS_W;
  canvas.height = CANVAS_H;
}

// === BOARD INIT ===
function initBoard() {
  board = Array.from({length: ROWS}, () => Array(COLS).fill(0));

  // Step1: 放物線で各列の高さを計算（揺らぎなし・滑らかなU字曲線）
  //   col 0, 19: 35段  col 9-10（中央）: 25段
  const center = (COLS - 1) / 2; // 9.5
  const centerH = 25;
  const edgeH   = 35;

  const colH = [];
  for (let c = 0; c < COLS; c++) {
    const t = (c - center) / center; // -1 〜 +1
    const h = Math.round(centerH + (edgeH - centerH) * t * t);
    colH.push(h);
    const startRow = ROWS - h;
    for (let r = Math.max(0, startRow); r < ROWS; r++) {
      board[r][c] = 8;
    }
  }

  // Step2: 中央から下へ蛇行する1マス幅の隙間（セグメント + L字ターン方式）
  //   6〜9行の直線を ±2〜3マスのL字ターンでつなぐ（col 4〜15 内に収める）
  const midCol = Math.round(center); // col 10
  const gapStartRow = ROWS - colH[midCol];

  let gapCol    = midCol;                             // col 10 から開始（1マス幅）
  let segRemain = 6 + Math.floor(Math.random() * 4); // 初回セグメント長 6〜9行

  for (let r = gapStartRow; r < ROWS; r++) {
    board[r][gapCol] = 0;

    segRemain--;
    if (segRemain <= 0) {
      // 新位置へ ±2〜3マス移動
      const dir    = Math.random() < 0.5 ? -1 : 1;
      const amount = 2 + Math.floor(Math.random() * 2);        // 2 or 3
      const newCol = Math.max(4, Math.min(COLS - 5, gapCol + dir * amount));

      // この行にL字ターンの水平ブリッジを描く
      const minC = Math.min(gapCol, newCol);
      const maxC = Math.max(gapCol, newCol);
      for (let c = minC; c <= maxC; c++) board[r][c] = 0;

      gapCol    = newCol;
      segRemain = 6 + Math.floor(Math.random() * 4); // 次のセグメント長 6〜9行
    }
  }
}

// === 7-BAG RANDOMIZER ===
function refillBag() {
  bag = [...PIECE_TYPES];
  for (let i = bag.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [bag[i], bag[j]] = [bag[j], bag[i]];
  }
}

function nextFromBag() {
  if (!bag || bag.length === 0) refillBag();
  return bag.pop();
}

// === COLLISION ===
function collides(type, rot, row, col) {
  for (const [dr, dc] of SHAPES[type][rot]) {
    const r = row + dr, c = col + dc;
    if (r < 0) continue;
    if (r >= ROWS || c < 0 || c >= COLS) return true;
    if (board[r][c] !== 0) return true;
  }
  return false;
}

// === PIECE SPAWNING ===
function spawnPiece() {
  const type = nextType || nextFromBag();
  nextType = nextFromBag();
  const rot = 0;
  const col = type === 'O' ? 9 : 8;
  const row = -1;
  if (collides(type, rot, row, col)) {
    if (collides(type, rot, 0, col)) {
      gameState = 'gameover';
      stopRiseInterval();
      return;
    }
    currentPiece = { type, rot, row: 0, col };
  } else {
    currentPiece = { type, rot, row, col };
  }
  lockDelay = 0;
  lockResets = 0;
  onGround = false;
}

// === MOVEMENT ===
function movePiece(dr, dc) {
  const p = currentPiece;
  if (!p) return false;
  const nr = p.row + dr, nc = p.col + dc;
  if (!collides(p.type, p.rot, nr, nc)) {
    p.row = nr;
    p.col = nc;
    if (dr === 0 && onGround && lockResets < 15) {
      lockDelay = 0;
      lockResets++;
    }
    return true;
  }
  return false;
}

function rotatePiece(dir) {
  const p = currentPiece;
  if (!p || p.type === 'O') return false;
  const oldRot = p.rot;
  const newRot = (oldRot + dir + 4) % 4;
  const key = oldRot + '>' + newRot;
  const kicks = p.type === 'I' ? KICKS_I[key] : KICKS_NORMAL[key];
  if (!kicks) return false;
  for (const [dx, dy] of kicks) {
    const nc = p.col + dx;
    const nr = p.row - dy;
    if (!collides(p.type, newRot, nr, nc)) {
      p.rot = newRot;
      p.row = nr;
      p.col = nc;
      if (onGround && lockResets < 15) {
        lockDelay = 0;
        lockResets++;
      }
      return true;
    }
  }
  return false;
}

function hardDrop() {
  const p = currentPiece;
  if (!p) return;
  let rows = 0;
  while (!collides(p.type, p.rot, p.row + 1, p.col)) {
    p.row++;
    rows++;
  }
  score += rows * 2;
  lockPiece();
}

function getGhostRow() {
  const p = currentPiece;
  if (!p) return 0;
  let gr = p.row;
  while (!collides(p.type, p.rot, gr + 1, p.col)) gr++;
  return gr;
}

// === LOCKING ===
function lockPiece() {
  const p = currentPiece;
  if (!p) return;
  const color = PIECE_COLORS[p.type];
  for (const [dr, dc] of SHAPES[p.type][p.rot]) {
    const r = p.row + dr, c = p.col + dc;
    if (r >= 0 && r < ROWS && c >= 0 && c < COLS) {
      board[r][c] = color;
    }
  }
  currentPiece = null;
  chainCount = 0;
  enterClearPhase();
}

// === LINE CLEAR ===
function findFullRows() {
  const full = [];
  for (let r = 0; r < ROWS; r++) {
    if (board[r].every(v => v !== 0)) full.push(r);
  }
  return full;
}

function collapseBoard() {
  const nonEmpty = board.filter(row => row.some(v => v !== 0));
  const emptyCount = ROWS - nonEmpty.length;
  board = [
    ...Array.from({length: emptyCount}, () => Array(COLS).fill(0)),
    ...nonEmpty,
  ];
}

// === CHAIN REACTION LOOP ===
function enterClearPhase() {
  gameState = 'clearing';
  chainReactionStep();
}

function spawnBlockParticles(r, c, colorIdx) {
  const bx = BOARD_X + c * CELL + CELL / 2;
  const by = BOARD_Y + r * CELL + CELL / 2;
  const dir = c < COLS / 2 ? -1 : 1;
  for (let i = 0; i < 6; i++) {
    particles.push({
      x: bx, y: by,
      vx: dir * (2.5 + Math.random() * 3.5),
      vy: -2 + Math.random() * 1.5,
      color: COLORS[colorIdx],
      alpha: 1.0,
      size: CELL * (0.4 + Math.random() * 0.3),
      decay: 0.018 + Math.random() * 0.012,
    });
  }
}

function beginFallingAnimation() {
  const nonEmptyRowIndices = [];
  for (let r = 0; r < ROWS; r++) {
    if (board[r].some(v => v !== 0)) nonEmptyRowIndices.push(r);
  }
  const targetStart = ROWS - nonEmptyRowIndices.length;

  const anim = nonEmptyRowIndices
    .map((fromRow, i) => ({
      rowData: [...board[fromRow]],
      fromY:    BOARD_Y + fromRow * CELL,
      toY:      BOARD_Y + (targetStart + i) * CELL,
      currentY: BOARD_Y + fromRow * CELL,
      vy: 0,
      targetRow: targetStart + i,
    }))
    .filter(fa => fa.fromY !== fa.toY);

  collapseBoard();

  if (anim.length === 0) {
    setTimeout(chainReactionStep, 50);
    return;
  }
  fallingRowsAnim = anim;
}

function chainReactionStep() {
  const fullRows = findFullRows();
  if (fullRows.length === 0) {
    document.getElementById('chainDisp').textContent = '';
    gameState = 'playing';
    spawnPiece();
    return;
  }
  chainCount++;
  const base = [0, 100, 300, 500, 800];
  score += (base[fullRows.length] || 800) * chainCount;
  totalLines += fullRows.length;
  level = Math.floor(totalLines / 10) + 1;
  dropInterval = Math.max(100, 1000 - (level - 1) * 80);
  updateUI();
  if (chainCount > 1) {
    document.getElementById('chainDisp').textContent = chainCount + '連鎖!';
  }
  const colGroups = [[0,4],[4,8],[8,12],[12,16],[16,20]];
  const waveDelay = 50;
  colGroups.forEach(([start, end], idx) => {
    setTimeout(() => {
      for (const r of fullRows) {
        for (let c = start; c < end; c++) {
          if (board[r][c] !== 0) {
            spawnBlockParticles(r, c, board[r][c]);
            board[r][c] = 0;
          }
        }
      }
    }, idx * waveDelay);
  });
  setTimeout(beginFallingAnimation, (colGroups.length - 1) * waveDelay + 250);
}

// === SCORING & UI ===
function updateUI() {
  document.getElementById('scoreDisp').textContent = score;
  document.getElementById('levelDisp').textContent = level;
  document.getElementById('linesDisp').textContent = totalLines;
}

// === RENDERING ===
function drawBlock(x, y, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x + 1, y + 1, CELL - 2, CELL - 2);
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.fillRect(x + 1, y + 1, CELL - 2, 3);
  ctx.fillRect(x + 1, y + 1, 3, CELL - 2);
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.fillRect(x + 1, y + CELL - 4, CELL - 2, 3);
  ctx.fillRect(x + CELL - 4, y + 1, 3, CELL - 2);
}

// NEXT ピースをサイドバー canvas に描画（PC・スマホ共通）
function drawSidebarNext() {
  if (!nextCtx || !nextType) return;
  const nw = nextCanvas.width, nh = nextCanvas.height;
  nextCtx.clearRect(0, 0, nw, nh);
  nextCtx.fillStyle = '#16213e';
  nextCtx.fillRect(0, 0, nw, nh);

  const sz = Math.floor(Math.min(nw, nh) / 4);
  const shape = SHAPES[nextType][0];
  const color = COLORS[PIECE_COLORS[nextType]];
  const drs = shape.map(([dr]) => dr);
  const dcs = shape.map(([, dc]) => dc);
  const minR = Math.min(...drs), maxR = Math.max(...drs);
  const minC = Math.min(...dcs), maxC = Math.max(...dcs);
  const pw = (maxC - minC + 1) * sz;
  const ph = (maxR - minR + 1) * sz;
  const ox = Math.floor((nw - pw) / 2) - minC * sz;
  const oy = Math.floor((nh - ph) / 2) - minR * sz;

  for (const [dr, dc] of shape) {
    nextCtx.fillStyle = color;
    nextCtx.fillRect(ox + dc * sz + 1, oy + dr * sz + 1, sz - 2, sz - 2);
  }
}

function render() {
  if (gameState === 'title') return;
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);

  // Board background
  ctx.fillStyle = '#222a4f';
  ctx.fillRect(BOARD_X, BOARD_Y, COLS * CELL, ROWS * CELL);

  // Grid lines
  ctx.strokeStyle = '#1a1a3e';
  ctx.lineWidth = 1;
  for (let r = 0; r <= ROWS; r++) {
    ctx.beginPath();
    ctx.moveTo(BOARD_X, BOARD_Y + r * CELL);
    ctx.lineTo(BOARD_X + COLS * CELL, BOARD_Y + r * CELL);
    ctx.stroke();
  }
  for (let c = 0; c <= COLS; c++) {
    ctx.beginPath();
    ctx.moveTo(BOARD_X + c * CELL, BOARD_Y);
    ctx.lineTo(BOARD_X + c * CELL, BOARD_Y + ROWS * CELL);
    ctx.stroke();
  }

  // Committed blocks
  const animRows = fallingRowsAnim
    ? new Set(fallingRowsAnim.map(f => f.targetRow))
    : new Set();
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (board[r][c] !== 0 && !animRows.has(r)) {
        drawBlock(BOARD_X + c * CELL, BOARD_Y + r * CELL, COLORS[board[r][c]]);
      }
    }
  }

  // Active piece + ghost
  if (currentPiece && gameState === 'playing') {
    const p = currentPiece;
    const shape = SHAPES[p.type][p.rot];
    const color = COLORS[PIECE_COLORS[p.type]];

    const ghostRow = getGhostRow();
    if (ghostRow !== p.row) {
      ctx.globalAlpha = 0.25;
      for (const [dr, dc] of shape) {
        const r = ghostRow + dr, c = p.col + dc;
        if (r >= 0) drawBlock(BOARD_X + c * CELL, BOARD_Y + r * CELL, color);
      }
      ctx.globalAlpha = 1.0;
    }

    for (const [dr, dc] of shape) {
      const r = p.row + dr, c = p.col + dc;
      if (r >= 0) drawBlock(BOARD_X + c * CELL, BOARD_Y + r * CELL, color);
    }
  }

  // Game over overlay
  if (gameState === 'gameover') {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(BOARD_X, BOARD_Y, COLS * CELL, ROWS * CELL);
    ctx.fillStyle = '#e94560';
    ctx.font = 'bold 32px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', BOARD_X + COLS * CELL / 2, BOARD_Y + ROWS * CELL / 2);
    ctx.textAlign = 'start';
  }

  // Paused overlay
  if (gameState === 'paused') {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(BOARD_X, BOARD_Y, COLS * CELL, ROWS * CELL);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 28px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('PAUSE', BOARD_X + COLS * CELL / 2, BOARD_Y + ROWS * CELL / 2);
    ctx.textAlign = 'start';
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.25;
    p.vx *= 0.97;
    p.alpha -= p.decay;
    if (p.alpha <= 0) { particles.splice(i, 1); continue; }
    ctx.save();
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    ctx.restore();
  }

  // Falling rows animation
  if (fallingRowsAnim) {
    for (const fa of fallingRowsAnim) {
      fa.vy += 1.5;
      fa.currentY = Math.min(fa.currentY + fa.vy, fa.toY);
      for (let c = 0; c < COLS; c++) {
        if (fa.rowData[c] !== 0) {
          drawBlock(BOARD_X + c * CELL, fa.currentY, COLORS[fa.rowData[c]]);
        }
      }
    }
    if (fallingRowsAnim.every(fa => fa.currentY >= fa.toY)) {
      fallingRowsAnim = null;
      setTimeout(chainReactionStep, 50);
    }
  }

  drawSidebarNext();
}

// === INPUT ===
function handleAction(action) {
  if (gameState !== 'playing' || !currentPiece) return;
  switch (action) {
    case 'left':  movePiece(0, -1); break;
    case 'right': movePiece(0, 1); break;
    case 'down':
      if (movePiece(1, 0)) { score += 1; dropTimer = 0; updateUI(); }
      break;
    case 'rotateCW':  rotatePiece(1); break;
    case 'rotateCCW': rotatePiece(-1); break;
    case 'hardDrop':  hardDrop(); updateUI(); break;
  }
}

function keyToAction(key) {
  switch (key) {
    case 'ArrowLeft': return 'left';
    case 'ArrowRight': return 'right';
    case 'ArrowDown': return 'down';
    case 'ArrowUp': case 'x': case 'X': return 'rotateCW';
    case 'z': case 'Z': return 'rotateCCW';
    case ' ': return 'hardDrop';
    default: return null;
  }
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'p' || e.key === 'P') {
    if (gameState === 'playing') { gameState = 'paused'; return; }
    if (gameState === 'paused') { gameState = 'playing'; lastTime = performance.now(); return; }
    return;
  }
  if (e.repeat) return;
  const action = keyToAction(e.key);
  if (!action) return;
  e.preventDefault();
  handleAction(action);
  if (action === 'left' || action === 'right' || action === 'down') {
    dasKeys[e.key] = { action, time: performance.now(), phase: 'delay' };
  }
});

document.addEventListener('keyup', (e) => {
  delete dasKeys[e.key];
});

function processDAS(now) {
  for (const key in dasKeys) {
    const d = dasKeys[key];
    const elapsed = now - d.time;
    if (d.phase === 'delay' && elapsed >= DAS_DELAY) {
      d.phase = 'repeat';
      d.time = now;
      handleAction(d.action);
    } else if (d.phase === 'repeat' && elapsed >= DAS_REPEAT) {
      d.time = now;
      handleAction(d.action);
    }
  }
}

// === TOUCH / SWIPE CONTROLS ===
function setupSwipeControls() {
  let startX, startY, startTime;

  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const t = e.touches[0];
    startX = t.clientX;
    startY = t.clientY;
    startTime = performance.now();
  }, { passive: false });

  canvas.addEventListener('touchend', (e) => {
    e.preventDefault();
    if (startX === undefined) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - startX;
    const dy = t.clientY - startY;
    const dt = performance.now() - startTime;
    const dist = Math.hypot(dx, dy);

    if (dt < 100 && dist < 10) {
      // タップ → 回転
      handleAction('rotateCW');
    } else if (dist >= 30) {
      if (Math.abs(dx) > Math.abs(dy)) {
        // 左右スワイプ
        handleAction(dx < 0 ? 'left' : 'right');
      } else if (dy > 0) {
        // 下スワイプ → ハードドロップ
        handleAction('hardDrop');
      }
    }
    startX = startY = undefined;
  }, { passive: false });

  canvas.addEventListener('touchcancel', () => {
    startX = startY = undefined;
  });
}

// === GAME LOOP ===
function gameLoop(timestamp) {
  const dt = timestamp - lastTime;
  lastTime = timestamp;

  if (gameState === 'playing' && currentPiece) {
    processDAS(timestamp);
    dropTimer += dt;

    const isOnGround = collides(currentPiece.type, currentPiece.rot,
                                currentPiece.row + 1, currentPiece.col);
    if (isOnGround) {
      onGround = true;
      lockDelay += dt;
      if (lockDelay >= 500) {
        lockPiece();
        updateUI();
      }
    } else {
      onGround = false;
      lockDelay = 0;
      if (dropTimer >= dropInterval) {
        dropTimer -= dropInterval;
        movePiece(1, 0);
      }
    }
  }

  render();
  requestAnimationFrame(gameLoop);
}

// === DIFFICULTY / RISE ===
function generateRiseRow() {
  if (riseGapCol === null) {
    const center = Math.round((COLS - 1) / 2);
    let detected = center;
    let minDist = COLS;
    for (let c = 0; c < COLS; c++) {
      if (board[ROWS - 2][c] === 0) {
        const dist = Math.abs(c - center);
        if (dist < minDist) { minDist = dist; detected = c; }
      }
    }
    riseGapCol = detected;
    riseSegRemain = 6 + Math.floor(Math.random() * 4);
  }

  const row = Array(COLS).fill(8);

  if (riseSegRemain <= 0) {
    const dir    = Math.random() < 0.5 ? -1 : 1;
    const amount = 2 + Math.floor(Math.random() * 2);
    const newCol = Math.max(4, Math.min(COLS - 5, riseGapCol + dir * amount));
    const minC = Math.min(riseGapCol, newCol);
    const maxC = Math.max(riseGapCol, newCol);
    for (let c = minC; c <= maxC; c++) row[c] = 0;
    riseGapCol = newCol;
    riseSegRemain = 6 + Math.floor(Math.random() * 4);
  } else {
    row[riseGapCol] = 0;
    riseSegRemain--;
  }

  return row;
}

function riseBoard() {
  if (gameState !== 'playing') return;
  for (let r = 0; r < ROWS - 1; r++) board[r] = [...board[r + 1]];
  board[ROWS - 1] = generateRiseRow();
  if (board[0].some(v => v !== 0)) { gameState = 'gameover'; stopRiseInterval(); return; }
  if (currentPiece && collides(currentPiece.type, currentPiece.rot, currentPiece.row, currentPiece.col)) {
    currentPiece.row--;
    if (currentPiece.row < -2 || collides(currentPiece.type, currentPiece.rot, currentPiece.row, currentPiece.col)) {
      gameState = 'gameover'; stopRiseInterval();
    }
  }
}

function startRiseInterval() {
  stopRiseInterval();
  const ms = difficulty === 'hard' ? 1000 : difficulty === 'normal' ? 3000 : 0;
  if (ms > 0) riseInterval = setInterval(riseBoard, ms);
}

function stopRiseInterval() {
  if (riseInterval) { clearInterval(riseInterval); riseInterval = null; }
}

// === START ===
function startGame() {
  initBoard();
  bag = null;
  nextType = null;
  score = 0;
  level = 1;
  totalLines = 0;
  chainCount = 0;
  particles = [];
  fallingRowsAnim = null;
  riseGapCol = null;
  riseSegRemain = 0;
  dropTimer = 0;
  dropInterval = 1000;
  lockDelay = 0;
  lockResets = 0;
  onGround = false;
  dasKeys = {};
  gameState = 'playing';
  startRiseInterval();
  document.getElementById('chainDisp').textContent = '';
  updateUI();
  spawnPiece();
  lastTime = performance.now();
}

// === INIT ===
gameState = 'title';
computeLayout();
setupSwipeControls();
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(computeLayout, 100);
});

document.querySelectorAll('.diffBtn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.diffBtn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    difficulty = btn.dataset.diff;
  });
});

document.getElementById('titleStartBtn').addEventListener('click', () => {
  document.getElementById('titleScreen').style.display = 'none';
  startGame();
});
document.getElementById('titleStartBtn').addEventListener('touchend', (e) => {
  e.preventDefault();
  document.getElementById('titleScreen').style.display = 'none';
  startGame();
}, { passive: false });

requestAnimationFrame(gameLoop);
</script>
</body>
