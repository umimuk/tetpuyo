<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TetPuyo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex; flex-direction: column; align-items: center;
    background: #1a1a2e; font-family: sans-serif; color: #fff;
    padding: 8px; user-select: none;
  }
  h1 { margin-bottom: 6px; font-size: 22px; letter-spacing: 2px; }

  /* ゲームラッパー: 盤面(左) + サイドバー(右) */
  .game-wrapper {
    display: flex; flex-direction: row; gap: 8px; align-items: flex-start;
  }
  canvas#game { display: block; border: 2px solid #333; border-radius: 4px; }

  /* 右サイドバー */
  .sidebar {
    display: flex; flex-direction: column; gap: 6px; align-items: center;
    background: #16213e; border-radius: 8px; padding: 8px 6px;
    width: 110px; flex-shrink: 0;
  }
  .next-box { display: flex; flex-direction: column; align-items: center; width: 100%; }
  .lbl { font-size: 11px; color: #888; margin-bottom: 2px; text-align: center; }
  .stat-box {
    display: flex; flex-direction: column; align-items: center;
    background: #1a1a3e; border-radius: 4px; padding: 4px 6px; width: 100%;
  }
  .stat-box .val { font-size: 15px; font-weight: bold; }
  #chainDisp { font-size: 13px; color: #ffea00; text-align: center; min-height: 18px; }
  button.restart {
    padding: 8px 4px; font-size: 13px; border: none;
    border-radius: 6px; background: #e94560; color: #fff; cursor: pointer; width: 100%;
  }
  button.restart:hover { background: #ff6b81; }

  .controls { margin-top: 8px; font-size: 12px; color: #888; text-align: center; line-height: 1.6; }

  /* Touch controls */
  .touch-controls { display: none; width: 100%; }
  .touch-row { display: flex; gap: 8px; justify-content: center; margin-bottom: 8px; }
  .touch-btn {
    width: 58px; height: 58px; font-size: 22px; border: 1px solid #444;
    border-radius: 10px; background: #16213e; color: #fff; cursor: pointer;
    touch-action: manipulation;
    display: flex; align-items: center; justify-content: center;
  }
  .touch-btn:active { background: #0f3460; }
  .touch-wide { width: 192px; font-size: 16px; }

  /* ===== MOBILE ===== */
  @media (max-width: 768px) {
    h1 { font-size: 16px; margin-bottom: 4px; }
    .sidebar { width: 86px; padding: 6px 4px; gap: 4px; }
    .stat-box .val { font-size: 13px; }
    button.restart { font-size: 12px; padding: 6px 4px; }

    #touchControls {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(26,26,46,0.96); border-top: 1px solid #333;
      padding: 8px 0 12px; z-index: 100;
    }
    body { padding-bottom: 150px; min-height: 0; overflow: hidden; }
    #kbControls { display: none; }
  }
</style>
</head>
<body>
<h1>TetPuyo</h1>
<div class="game-wrapper">
  <canvas id="game"></canvas>
  <aside class="sidebar">
    <div class="next-box">
      <div class="lbl">NEXT</div>
      <canvas id="nextCanvas" width="72" height="60"></canvas>
    </div>
    <div class="stat-box"><div class="lbl">スコア</div><div class="val" id="scoreDisp">0</div></div>
    <div class="stat-box"><div class="lbl">Lv</div><div class="val" id="levelDisp">1</div></div>
    <div class="stat-box"><div class="lbl">ライン</div><div class="val" id="linesDisp">0</div></div>
    <div id="chainDisp"></div>
    <button class="restart" id="restartBtn" onclick="startGame()">再スタート</button>
  </aside>
</div>
<div class="controls" id="kbControls">
  ←→: 移動　↓: ソフトドロップ　↑/X: 右回転　Z: 左回転　Space: ハードドロップ　P: ポーズ
</div>
<div class="touch-controls" id="touchControls">
  <div class="touch-row">
    <button class="touch-btn" id="btnLeft">◀</button>
    <button class="touch-btn" id="btnCCW">↺</button>
    <button class="touch-btn" id="btnDown">▼</button>
    <button class="touch-btn" id="btnCW">↻</button>
    <button class="touch-btn" id="btnRight">▶</button>
  </div>
  <div class="touch-row">
    <button class="touch-btn touch-wide" id="btnDrop">⬇ Hard Drop</button>
  </div>
</div>
<script>
// === CONSTANTS ===
const COLS = 20;
const ROWS = 40;
const MOBILE_BREAKPOINT = 768;

// Layout variables — computed by computeLayout()
let CELL, BOARD_X, BOARD_Y, CANVAS_W, CANVAS_H;
let isMobileLayout = false;

const COLORS = [
  null,
  '#00e5ff', // 1 cyan  (I)
  '#2962ff', // 2 blue  (J)
  '#ff9100', // 3 orange(L)
  '#ffea00', // 4 yellow(O)
  '#00e676', // 5 green (S)
  '#d500f9', // 6 purple(T)
  '#ff1744', // 7 red   (Z)
  '#78909c', // 8 gray  (pre-existing)
];

// === PIECE DEFINITIONS (SRS) ===
const SHAPES = {
  I: [[[0,0],[0,1],[0,2],[0,3]],[[0,2],[1,2],[2,2],[3,2]],[[2,0],[2,1],[2,2],[2,3]],[[0,1],[1,1],[2,1],[3,1]]],
  J: [[[0,0],[1,0],[1,1],[1,2]],[[0,1],[0,2],[1,1],[2,1]],[[1,0],[1,1],[1,2],[2,2]],[[0,1],[1,1],[2,0],[2,1]]],
  L: [[[0,2],[1,0],[1,1],[1,2]],[[0,1],[1,1],[2,1],[2,2]],[[1,0],[1,1],[1,2],[2,0]],[[0,0],[0,1],[1,1],[2,1]]],
  O: [[[0,1],[0,2],[1,1],[1,2]],[[0,1],[0,2],[1,1],[1,2]],[[0,1],[0,2],[1,1],[1,2]],[[0,1],[0,2],[1,1],[1,2]]],
  S: [[[0,1],[0,2],[1,0],[1,1]],[[0,1],[1,1],[1,2],[2,2]],[[1,1],[1,2],[2,0],[2,1]],[[0,0],[1,0],[1,1],[2,1]]],
  T: [[[0,1],[1,0],[1,1],[1,2]],[[0,1],[1,1],[1,2],[2,1]],[[1,0],[1,1],[1,2],[2,1]],[[0,1],[1,0],[1,1],[2,1]]],
  Z: [[[0,0],[0,1],[1,1],[1,2]],[[0,2],[1,1],[1,2],[2,1]],[[1,0],[1,1],[2,1],[2,2]],[[0,1],[1,0],[1,1],[2,0]]],
};

const PIECE_COLORS = { I:1, J:2, L:3, O:4, S:5, T:6, Z:7 };
const PIECE_TYPES = ['I','J','L','O','S','T','Z'];

// SRS wall kick data
const KICKS_NORMAL = {
  '0>1': [[0,0],[-1,0],[-1,-1],[0,2],[-1,2]],
  '1>0': [[0,0],[1,0],[1,1],[0,-2],[1,-2]],
  '1>2': [[0,0],[1,0],[1,1],[0,-2],[1,-2]],
  '2>1': [[0,0],[-1,0],[-1,-1],[0,2],[-1,2]],
  '2>3': [[0,0],[1,0],[1,-1],[0,2],[1,2]],
  '3>2': [[0,0],[-1,0],[-1,1],[0,-2],[-1,-2]],
  '3>0': [[0,0],[-1,0],[-1,1],[0,-2],[-1,-2]],
  '0>3': [[0,0],[1,0],[1,-1],[0,2],[1,2]],
};
const KICKS_I = {
  '0>1': [[0,0],[-2,0],[1,0],[-2,1],[1,-2]],
  '1>0': [[0,0],[2,0],[-1,0],[2,-1],[-1,2]],
  '1>2': [[0,0],[-1,0],[2,0],[-1,-2],[2,1]],
  '2>1': [[0,0],[1,0],[-2,0],[1,2],[-2,-1]],
  '2>3': [[0,0],[2,0],[-1,0],[2,-1],[-1,2]],
  '3>2': [[0,0],[-2,0],[1,0],[-2,1],[1,-2]],
  '3>0': [[0,0],[1,0],[-2,0],[1,2],[-2,-1]],
  '0>3': [[0,0],[-1,0],[2,0],[-1,-2],[2,1]],
};

// === GAME STATE ===
let board, currentPiece, nextType, bag;
let score, level, totalLines, chainCount;
let gameState;
let dropTimer, dropInterval, lockDelay, lockResets, onGround;
let lastTime;

// DAS state
let dasKeys = {};
const DAS_DELAY = 170;
const DAS_REPEAT = 50;

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const nextCanvas = document.getElementById('nextCanvas');
const nextCtx = nextCanvas ? nextCanvas.getContext('2d') : null;

// === RESPONSIVE LAYOUT ===
function computeLayout() {
  const screenW = window.innerWidth;
  const screenH = window.innerHeight;
  isMobileLayout = screenW <= MOBILE_BREAKPOINT;

  // 右サイドバー幅 (CSS と合わせる)
  const SIDEBAR_W = isMobileLayout ? 86 : 110;
  const GAP = 8;   // sidebar との gap
  const HPAD = 8;  // body 左右パディング
  const H1_H = isMobileLayout ? 26 : 34;  // h1 + margin
  const TOUCH_H = isMobileLayout ? 150 : 0; // タッチコントロール確保
  const VPAD = 8;  // body 上下パディング

  const availW = screenW - SIDEBAR_W - GAP - HPAD * 2;
  const availH = screenH - H1_H - VPAD * 2 - TOUCH_H;

  const cellFromW = Math.floor(availW / COLS);
  const cellFromH = Math.floor((availH - 20) / ROWS);
  CELL = Math.max(8, Math.min(20, Math.min(cellFromW, cellFromH)));

  BOARD_X = 10;
  BOARD_Y = 10;
  CANVAS_W = BOARD_X + COLS * CELL + 10;
  CANVAS_H = BOARD_Y + ROWS * CELL + 10;

  canvas.width = CANVAS_W;
  canvas.height = CANVAS_H;
}

// === BOARD INIT ===
function initBoard() {
  board = Array.from({length: ROWS}, () => Array(COLS).fill(0));

  // Step1: 凹型の基本形状
  //   両端: 25〜30行、中央: 10〜15行
  //   exponent=0.8 で中央〜端が均一な傾斜（見本に近い）
  const center = (COLS - 1) / 2; // 9.5
  const minH = 12; // 中央の高さ（行数）
  const maxH = 28; // 端の高さ（行数）
  for (let c = 0; c < COLS; c++) {
    const ratio = Math.abs(c - center) / center;
    const base = Math.round(minH + (maxH - minH) * Math.pow(ratio, 0.8));
    const noise = Math.round(Math.random() * 6 - 3); // ±3 ランダム揺らぎ
    const h = Math.max(minH - 2, Math.min(maxH + 2, base + noise));
    const startRow = ROWS - h;
    for (let r = Math.max(0, startRow); r < ROWS; r++) {
      board[r][c] = 8;
    }
  }

  // Step2: 壁の内側に直方体状の出っ張りを配置（見本のようなブロック感）
  const numBumps = 12 + Math.floor(Math.random() * 6); // 12〜17個
  for (let i = 0; i < numBumps; i++) {
    const r0 = 6 + Math.floor(Math.random() * (ROWS - 14));
    // この行の左・右壁の内側エッジを検出
    let leftEdge = -1;
    for (let c = 0; c < COLS; c++) {
      if (board[r0][c] === 0) { leftEdge = c - 1; break; }
    }
    let rightEdge = COLS;
    for (let c = COLS - 1; c >= 0; c--) {
      if (board[r0][c] === 0) { rightEdge = c + 1; break; }
    }
    if (leftEdge < 0 || rightEdge >= COLS) continue;
    const openW = rightEdge - leftEdge - 1;
    if (openW < 5) continue;

    const bumpW = 2 + Math.floor(Math.random() * 3); // 幅 2〜4列
    const bumpH = 3 + Math.floor(Math.random() * 5); // 高さ 3〜7行
    if (bumpW > Math.floor(openW / 3)) continue; // 開口幅の1/3以内

    if (Math.random() < 0.5) {
      // 左壁から右へ突出
      for (let dr = 0; dr < bumpH && r0 + dr < ROWS - 1; dr++) {
        for (let dc = 1; dc <= bumpW; dc++) {
          if (leftEdge + dc < rightEdge - 1) board[r0 + dr][leftEdge + dc] = 8;
        }
      }
    } else {
      // 右壁から左へ突出
      for (let dr = 0; dr < bumpH && r0 + dr < ROWS - 1; dr++) {
        for (let dc = 1; dc <= bumpW; dc++) {
          if (rightEdge - dc > leftEdge + 1) board[r0 + dr][rightEdge - dc] = 8;
        }
      }
    }
  }

  // Step3: 完全に埋まった行（底部）に1マスの蛇行穴を開ける
  let holeCenter = Math.floor(COLS / 2);
  for (let r = 0; r < ROWS; r++) {
    if (!board[r].every(v => v !== 0)) continue;
    holeCenter = Math.max(2, Math.min(COLS - 3,
      holeCenter + Math.round(Math.random() * 2 - 1)));
    board[r][holeCenter] = 0;
  }
}

// === 7-BAG RANDOMIZER ===
function refillBag() {
  bag = [...PIECE_TYPES];
  for (let i = bag.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [bag[i], bag[j]] = [bag[j], bag[i]];
  }
}

function nextFromBag() {
  if (!bag || bag.length === 0) refillBag();
  return bag.pop();
}

// === COLLISION ===
function collides(type, rot, row, col) {
  for (const [dr, dc] of SHAPES[type][rot]) {
    const r = row + dr, c = col + dc;
    if (r < 0) continue;
    if (r >= ROWS || c < 0 || c >= COLS) return true;
    if (board[r][c] !== 0) return true;
  }
  return false;
}

// === PIECE SPAWNING ===
function spawnPiece() {
  const type = nextType || nextFromBag();
  nextType = nextFromBag();
  const rot = 0;
  const col = type === 'O' ? 9 : 8;
  const row = -1;
  if (collides(type, rot, row, col)) {
    if (collides(type, rot, 0, col)) {
      gameState = 'gameover';
      return;
    }
    currentPiece = { type, rot, row: 0, col };
  } else {
    currentPiece = { type, rot, row, col };
  }
  lockDelay = 0;
  lockResets = 0;
  onGround = false;
}

// === MOVEMENT ===
function movePiece(dr, dc) {
  const p = currentPiece;
  if (!p) return false;
  const nr = p.row + dr, nc = p.col + dc;
  if (!collides(p.type, p.rot, nr, nc)) {
    p.row = nr;
    p.col = nc;
    if (dr === 0 && onGround && lockResets < 15) {
      lockDelay = 0;
      lockResets++;
    }
    return true;
  }
  return false;
}

function rotatePiece(dir) {
  const p = currentPiece;
  if (!p || p.type === 'O') return false;
  const oldRot = p.rot;
  const newRot = (oldRot + dir + 4) % 4;
  const key = oldRot + '>' + newRot;
  const kicks = p.type === 'I' ? KICKS_I[key] : KICKS_NORMAL[key];
  if (!kicks) return false;
  for (const [dx, dy] of kicks) {
    const nc = p.col + dx;
    const nr = p.row - dy;
    if (!collides(p.type, newRot, nr, nc)) {
      p.rot = newRot;
      p.row = nr;
      p.col = nc;
      if (onGround && lockResets < 15) {
        lockDelay = 0;
        lockResets++;
      }
      return true;
    }
  }
  return false;
}

function hardDrop() {
  const p = currentPiece;
  if (!p) return;
  let rows = 0;
  while (!collides(p.type, p.rot, p.row + 1, p.col)) {
    p.row++;
    rows++;
  }
  score += rows * 2;
  lockPiece();
}

function getGhostRow() {
  const p = currentPiece;
  if (!p) return 0;
  let gr = p.row;
  while (!collides(p.type, p.rot, gr + 1, p.col)) gr++;
  return gr;
}

// === LOCKING ===
function lockPiece() {
  const p = currentPiece;
  if (!p) return;
  const color = PIECE_COLORS[p.type];
  for (const [dr, dc] of SHAPES[p.type][p.rot]) {
    const r = p.row + dr, c = p.col + dc;
    if (r >= 0 && r < ROWS && c >= 0 && c < COLS) {
      board[r][c] = color;
    }
  }
  currentPiece = null;
  chainCount = 0;
  enterClearPhase();
}

// === LINE CLEAR ===
function findFullRows() {
  const full = [];
  for (let r = 0; r < ROWS; r++) {
    if (board[r].every(v => v !== 0)) full.push(r);
  }
  return full;
}

function collapseBoard() {
  const nonEmpty = board.filter(row => row.some(v => v !== 0));
  const emptyCount = ROWS - nonEmpty.length;
  board = [
    ...Array.from({length: emptyCount}, () => Array(COLS).fill(0)),
    ...nonEmpty,
  ];
}

// === CHAIN REACTION LOOP ===
function enterClearPhase() {
  gameState = 'clearing';
  chainReactionStep();
}

function chainReactionStep() {
  const fullRows = findFullRows();
  if (fullRows.length === 0) {
    document.getElementById('chainDisp').textContent = '';
    gameState = 'playing';
    spawnPiece();
    return;
  }
  chainCount++;
  const base = [0, 100, 300, 500, 800];
  score += (base[fullRows.length] || 800) * chainCount;
  totalLines += fullRows.length;
  level = Math.floor(totalLines / 10) + 1;
  dropInterval = Math.max(100, 1000 - (level - 1) * 80);
  updateUI();
  if (chainCount > 1) {
    document.getElementById('chainDisp').textContent = chainCount + '連鎖!';
  }
  for (const r of fullRows) {
    for (let c = 0; c < COLS; c++) board[r][c] = 0;
  }
  collapseBoard();
  setTimeout(chainReactionStep, 300);
}

// === SCORING & UI ===
function updateUI() {
  document.getElementById('scoreDisp').textContent = score;
  document.getElementById('levelDisp').textContent = level;
  document.getElementById('linesDisp').textContent = totalLines;
}

// === RENDERING ===
function drawBlock(x, y, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x + 1, y + 1, CELL - 2, CELL - 2);
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.fillRect(x + 1, y + 1, CELL - 2, 3);
  ctx.fillRect(x + 1, y + 1, 3, CELL - 2);
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.fillRect(x + 1, y + CELL - 4, CELL - 2, 3);
  ctx.fillRect(x + CELL - 4, y + 1, 3, CELL - 2);
}

// NEXT ピースをサイドバー canvas に描画（PC・スマホ共通）
function drawSidebarNext() {
  if (!nextCtx || !nextType) return;
  const nw = nextCanvas.width, nh = nextCanvas.height;
  nextCtx.clearRect(0, 0, nw, nh);
  nextCtx.fillStyle = '#16213e';
  nextCtx.fillRect(0, 0, nw, nh);

  const sz = 14;
  const shape = SHAPES[nextType][0];
  const color = COLORS[PIECE_COLORS[nextType]];
  const drs = shape.map(([dr]) => dr);
  const dcs = shape.map(([, dc]) => dc);
  const minR = Math.min(...drs), maxR = Math.max(...drs);
  const minC = Math.min(...dcs), maxC = Math.max(...dcs);
  const pw = (maxC - minC + 1) * sz;
  const ph = (maxR - minR + 1) * sz;
  const ox = Math.floor((nw - pw) / 2) - minC * sz;
  const oy = Math.floor((nh - ph) / 2) - minR * sz;

  for (const [dr, dc] of shape) {
    nextCtx.fillStyle = color;
    nextCtx.fillRect(ox + dc * sz + 1, oy + dr * sz + 1, sz - 2, sz - 2);
  }
}

function render() {
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);

  // Board background
  ctx.fillStyle = '#16213e';
  ctx.fillRect(BOARD_X, BOARD_Y, COLS * CELL, ROWS * CELL);

  // Grid lines
  ctx.strokeStyle = '#1a1a3e';
  ctx.lineWidth = 1;
  for (let r = 0; r <= ROWS; r++) {
    ctx.beginPath();
    ctx.moveTo(BOARD_X, BOARD_Y + r * CELL);
    ctx.lineTo(BOARD_X + COLS * CELL, BOARD_Y + r * CELL);
    ctx.stroke();
  }
  for (let c = 0; c <= COLS; c++) {
    ctx.beginPath();
    ctx.moveTo(BOARD_X + c * CELL, BOARD_Y);
    ctx.lineTo(BOARD_X + c * CELL, BOARD_Y + ROWS * CELL);
    ctx.stroke();
  }

  // Committed blocks
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (board[r][c] !== 0) {
        drawBlock(BOARD_X + c * CELL, BOARD_Y + r * CELL, COLORS[board[r][c]]);
      }
    }
  }

  // Active piece + ghost
  if (currentPiece && gameState === 'playing') {
    const p = currentPiece;
    const shape = SHAPES[p.type][p.rot];
    const color = COLORS[PIECE_COLORS[p.type]];

    const ghostRow = getGhostRow();
    if (ghostRow !== p.row) {
      ctx.globalAlpha = 0.25;
      for (const [dr, dc] of shape) {
        const r = ghostRow + dr, c = p.col + dc;
        if (r >= 0) drawBlock(BOARD_X + c * CELL, BOARD_Y + r * CELL, color);
      }
      ctx.globalAlpha = 1.0;
    }

    for (const [dr, dc] of shape) {
      const r = p.row + dr, c = p.col + dc;
      if (r >= 0) drawBlock(BOARD_X + c * CELL, BOARD_Y + r * CELL, color);
    }
  }

  // Game over overlay
  if (gameState === 'gameover') {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(BOARD_X, BOARD_Y, COLS * CELL, ROWS * CELL);
    ctx.fillStyle = '#e94560';
    ctx.font = 'bold 32px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', BOARD_X + COLS * CELL / 2, BOARD_Y + ROWS * CELL / 2);
    ctx.textAlign = 'start';
  }

  // Paused overlay
  if (gameState === 'paused') {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(BOARD_X, BOARD_Y, COLS * CELL, ROWS * CELL);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 28px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('PAUSE', BOARD_X + COLS * CELL / 2, BOARD_Y + ROWS * CELL / 2);
    ctx.textAlign = 'start';
  }

  drawSidebarNext();
}

// === INPUT ===
function handleAction(action) {
  if (gameState !== 'playing' || !currentPiece) return;
  switch (action) {
    case 'left':  movePiece(0, -1); break;
    case 'right': movePiece(0, 1); break;
    case 'down':
      if (movePiece(1, 0)) { score += 1; dropTimer = 0; updateUI(); }
      break;
    case 'rotateCW':  rotatePiece(1); break;
    case 'rotateCCW': rotatePiece(-1); break;
    case 'hardDrop':  hardDrop(); updateUI(); break;
  }
}

function keyToAction(key) {
  switch (key) {
    case 'ArrowLeft': return 'left';
    case 'ArrowRight': return 'right';
    case 'ArrowDown': return 'down';
    case 'ArrowUp': case 'x': case 'X': return 'rotateCW';
    case 'z': case 'Z': return 'rotateCCW';
    case ' ': return 'hardDrop';
    default: return null;
  }
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'p' || e.key === 'P') {
    if (gameState === 'playing') { gameState = 'paused'; return; }
    if (gameState === 'paused') { gameState = 'playing'; lastTime = performance.now(); return; }
    return;
  }
  if (e.repeat) return;
  const action = keyToAction(e.key);
  if (!action) return;
  e.preventDefault();
  handleAction(action);
  if (action === 'left' || action === 'right' || action === 'down') {
    dasKeys[e.key] = { action, time: performance.now(), phase: 'delay' };
  }
});

document.addEventListener('keyup', (e) => {
  delete dasKeys[e.key];
});

function processDAS(now) {
  for (const key in dasKeys) {
    const d = dasKeys[key];
    const elapsed = now - d.time;
    if (d.phase === 'delay' && elapsed >= DAS_DELAY) {
      d.phase = 'repeat';
      d.time = now;
      handleAction(d.action);
    } else if (d.phase === 'repeat' && elapsed >= DAS_REPEAT) {
      d.time = now;
      handleAction(d.action);
    }
  }
}

// === TOUCH CONTROLS ===
function setupTouchControls() {
  const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
  if (isTouchDevice) {
    document.getElementById('touchControls').style.display = 'block';
    document.getElementById('kbControls').style.display = 'none';
  }

  const btns = [
    { id: 'btnLeft',  action: 'left',      repeat: true  },
    { id: 'btnRight', action: 'right',     repeat: true  },
    { id: 'btnDown',  action: 'down',      repeat: true  },
    { id: 'btnCW',    action: 'rotateCW',  repeat: false },
    { id: 'btnCCW',   action: 'rotateCCW', repeat: false },
    { id: 'btnDrop',  action: 'hardDrop',  repeat: false },
  ];

  for (const btn of btns) {
    const el = document.getElementById(btn.id);
    const dasKey = 'touch_' + btn.action;
    el.addEventListener('touchstart', (e) => {
      e.preventDefault();
      handleAction(btn.action);
      if (btn.repeat) {
        dasKeys[dasKey] = { action: btn.action, time: performance.now(), phase: 'delay' };
      }
    }, { passive: false });
    el.addEventListener('touchend', (e) => {
      e.preventDefault();
      delete dasKeys[dasKey];
    }, { passive: false });
    el.addEventListener('touchcancel', () => {
      delete dasKeys[dasKey];
    });
  }
}

// === GAME LOOP ===
function gameLoop(timestamp) {
  const dt = timestamp - lastTime;
  lastTime = timestamp;

  if (gameState === 'playing' && currentPiece) {
    processDAS(timestamp);
    dropTimer += dt;

    const isOnGround = collides(currentPiece.type, currentPiece.rot,
                                currentPiece.row + 1, currentPiece.col);
    if (isOnGround) {
      onGround = true;
      lockDelay += dt;
      if (lockDelay >= 500) {
        lockPiece();
        updateUI();
      }
    } else {
      onGround = false;
      lockDelay = 0;
      if (dropTimer >= dropInterval) {
        dropTimer -= dropInterval;
        movePiece(1, 0);
      }
    }
  }

  render();
  requestAnimationFrame(gameLoop);
}

// === START ===
function startGame() {
  initBoard();
  bag = null;
  nextType = null;
  score = 0;
  level = 1;
  totalLines = 0;
  chainCount = 0;
  dropTimer = 0;
  dropInterval = 1000;
  lockDelay = 0;
  lockResets = 0;
  onGround = false;
  dasKeys = {};
  gameState = 'playing';
  document.getElementById('chainDisp').textContent = '';
  updateUI();
  spawnPiece();
  lastTime = performance.now();
}

// === INIT ===
computeLayout();
setupTouchControls();
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(computeLayout, 100);
});
startGame();
requestAnimationFrame(gameLoop);
</script>
